<!DOCTYPE html>
<html>
<head>
    <title>Lead Dashboard</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        button, input {
            padding: 8px;
            margin-right: 10px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .score {
            font-weight: bold;
            color: green;
        }

        /* POPUP */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 20px;
            width: 400px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Top Leads</h2>

<input type="number" id="minScore" placeholder="Min Score">
<input type="text" id="search" placeholder="Search">
<button onclick="loadLeads()">Load Leads</button>
<button onclick="exportCSV()">Export CSV</button>

<div id="leads"></div>

<!-- POPUP -->
<div id="modal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
const API_BASE = "https://lead-gen-system-s8n2.onrender.com";

async function loadLeads() {
    const res = await fetch(`${API_BASE}/top-leads`);
    let data = await res.json();

    const minScore = parseInt(document.getElementById("minScore").value) || 0;
    const search = document.getElementById("search").value.toLowerCase();

    data = data.filter(item => {
        const matchesScore = item.score >= minScore;
        const text = `${item.business || ""} ${item.plumber || ""}`.toLowerCase();
        return matchesScore && text.includes(search);
    });

    const container = document.getElementById("leads");
    container.innerHTML = "";

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div><b>${item.business}</b></div>
            <div>→ ${item.plumber}</div>
            <div class="score">Score: ${item.score}</div>
        `;

        div.onclick = () => showDetails(item);

        container.appendChild(div);
    });
}

function showDetails(item) {
    const modal = document.getElementById("modal");
    const content = document.getElementById("modalContent");

    content.innerHTML = `
        <h3>${item.business}</h3>
        <p><b>Plumber:</b> ${item.plumber}</p>
        <p><b>Score:</b> ${item.score}</p>
        <p><b>Email:</b> ${item.email || "N/A"}</p>
        <p><b>Phone:</b> ${item.phone || "N/A"}</p>
    `;

    modal.style.display = "block";
}

window.onclick = function(event) {
    const modal = document.getElementById("modal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
};

function exportCSV() {
    window.open(`${API_BASE}/export/csv`, "_blank");
}

/* AUTO REFRESH */
setInterval(loadLeads, 30000);
loadLeads();
</script>

</body>
</html>
